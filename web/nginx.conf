server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Defer DNS lookups for upstream hosts to request time using this resolver.
    # $NAMESERVER is extracted from /etc/resolv.conf by docker-entrypoint.sh at
    # container start. ipv6=on matters because Railway's private network
    # (*.railway.internal) is IPv6-only.
    resolver ${NAMESERVER} valid=30s ipv6=on;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy /api/* to the API service over Railway's private network.
    # Keeps everything same-origin in prod, mirroring dev's Vite proxy — no CORS needed.
    #
    # The upstream goes through a variable so nginx resolves DNS at request time
    # (using the resolver above) instead of at config-load. Without this, nginx
    # crashes immediately on Railway because api.railway.internal isn't yet
    # resolvable when nginx parses its config — and the container never starts
    # listening, so every healthcheck fails.
    location /api/ {
        set $upstream_api "${API_HOST}:${API_PORT}";
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Hashed assets — long cache.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — every other path returns index.html so React Router owns routing.
    location / {
        try_files $uri /index.html;
    }
}
